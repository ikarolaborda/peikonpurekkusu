# peikonpurekkusu — full stack
# Profiles:
#   (default)      dev stack: 1 Kafka broker, single Cassandra node
#   ha             3-broker Kafka overlay (see docker-compose.ha.yml)
#   observability  OTel collector + backends
#
# Networks: edge (Traefik ↔ service fronts) / internal (services ↔ data).
# Only Traefik publishes host ports.

name: peikonpurekkusu

x-postgres-base: &postgres-base
  image: postgres:18.4-alpine
  restart: unless-stopped
  mem_limit: 224m
  networks: [internal]
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
    interval: 5s
    timeout: 3s
    retries: 10

services:
  # ── Edge ───────────────────────────────────────────────────────────────────
  traefik:
    mem_limit: 128m
    image: traefik:v3.7
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedByDefault=false"
      # Only ingest OUR containers: other local stacks define colliding router
      # names (e.g. a generic "frontend") on the same Docker daemon.
      - "--providers.docker.constraints=Label(`peikon.stack`,`true`)"
      - "--providers.docker.network=peikonpurekkusu_edge"
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--entryPoints.web.address=:80"
      - "--api.dashboard=true"
      - "--ping=true"
      - "--log.level=INFO"
      - "--accesslog=true"
    ports:
      - "${HTTP_PORT:-8088}:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    networks: [edge]
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    labels:
      - "traefik.enable=true"
      - "peikon.stack=true"
      - "traefik.http.routers.peikon-dashboard.rule=Host(`${TRAEFIK_DASHBOARD_HOST}`) && (PathPrefix(`/api`) || PathPrefix(`/dashboard`))"
      - "traefik.http.routers.peikon-dashboard.service=api@internal"
      - "traefik.http.routers.peikon-dashboard.entrypoints=web"
      - "traefik.http.routers.peikon-dashboard.middlewares=peikon-dash-auth"
      - "traefik.http.middlewares.peikon-dash-auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH}"

  # ── Kafka (KRaft, dev: single combined-mode broker) ───────────────────────
  kafka:
    mem_limit: 768m
    image: apache/kafka:4.3.1
    restart: unless-stopped
    networks: [internal]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_LISTENERS: "CONTROLLER://:29093,PLAINTEXT://:19092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:19092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      CLUSTER_ID: "${KAFKA_CLUSTER_ID}"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
      # keep the broker a small target on memory-constrained Docker VMs
      KAFKA_HEAP_OPTS: "-Xmx384M -Xms256M"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:19092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s

  kafka-init:
    image: apache/kafka:4.3.1
    networks: [internal]
    restart: "no"
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/init/create-topics.sh"]
    environment:
      BOOTSTRAP: "kafka:19092"
    volumes:
      - ./infra/kafka/create-topics.sh:/init/create-topics.sh:ro

  # ── Schema registry (Apicurio, Confluent-compat endpoint) ─────────────────
  registry-db:
    <<: *postgres-base
    environment:
      POSTGRES_USER: registry
      POSTGRES_PASSWORD: ${REGISTRY_DB_PASSWORD:-registry-dev-pw}
      POSTGRES_DB: registry
    volumes:
      - registry-db-data:/var/lib/postgresql

  apicurio-registry:
    mem_limit: 448m
    image: quay.io/apicurio/apicurio-registry:3.3.0
    restart: unless-stopped
    networks: [internal]
    depends_on:
      registry-db:
        condition: service_healthy
    environment:
      QUARKUS_HTTP_PORT: "8080"
      # SQL storage — schemas survive registry restarts (in-memory loses them).
      # The app wires quarkus.datasource.postgresql.* (UNQUOTED name → single-
      # underscore env vars) from apicurio.datasource.*; activation must be
      # flipped explicitly (h2 is active by default and would otherwise run
      # its health check against the postgres URL with the h2 driver).
      APICURIO_STORAGE_KIND: sql
      APICURIO_STORAGE_SQL_KIND: postgresql
      APICURIO_DATASOURCE_URL: jdbc:postgresql://registry-db:5432/registry
      APICURIO_DATASOURCE_USERNAME: registry
      APICURIO_DATASOURCE_PASSWORD: ${REGISTRY_DB_PASSWORD:-registry-dev-pw}
      QUARKUS_DATASOURCE_POSTGRESQL_ACTIVE: "true"
      QUARKUS_DATASOURCE_H2_ACTIVE: "false"
    healthcheck:
      # functional probe: ccompat API answering implies storage is working
      # (the image's /health/ready is unusable with sql storage — see above)
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/apis/ccompat/v7/subjects || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  schemas-init:
    image: python:3.13-alpine
    networks: [internal]
    restart: "no"
    depends_on:
      apicurio-registry:
        condition: service_healthy
    working_dir: /work
    entrypoint: ["python3", "scripts/register_schemas.py"]
    environment:
      SCHEMA_REGISTRY_URL: "http://apicurio-registry:8080/apis/ccompat/v7"
      EVENTS_DIR: "contracts/events"
    volumes:
      - ./scripts/register_schemas.py:/work/scripts/register_schemas.py:ro
      - ./contracts/events:/work/contracts/events:ro

  # ── Redis (two instances: session/denylist must never evict; cache may) ───
  redis-session:
    mem_limit: 320m
    image: redis:8.8-alpine
    restart: unless-stopped
    networks: [internal]
    command: >
      redis-server --requirepass ${REDIS_SESSION_PASSWORD}
      --maxmemory 256mb --maxmemory-policy noeviction
      --appendonly yes --appendfsync everysec
    volumes:
      - redis-session-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 10
    environment:
      REDIS_PASSWORD: ${REDIS_SESSION_PASSWORD}

  redis-cache:
    mem_limit: 320m
    image: redis:8.8-alpine
    restart: unless-stopped
    networks: [internal]
    command: >
      redis-server --requirepass ${REDIS_CACHE_PASSWORD}
      --maxmemory 256mb --maxmemory-policy allkeys-lru
      --save '' --appendonly no
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 10
    environment:
      REDIS_PASSWORD: ${REDIS_CACHE_PASSWORD}

  # ── PostgreSQL — database per service ──────────────────────────────────────
  users-db:
    <<: *postgres-base
    environment:
      POSTGRES_USER: ${USERS_DB_USER}
      POSTGRES_PASSWORD: ${USERS_DB_PASSWORD}
      POSTGRES_DB: ${USERS_DB_NAME}
    volumes:
      - users-db-data:/var/lib/postgresql

  account-db:
    <<: *postgres-base
    environment:
      POSTGRES_USER: ${ACCOUNT_DB_USER}
      POSTGRES_PASSWORD: ${ACCOUNT_DB_PASSWORD}
      POSTGRES_DB: ${ACCOUNT_DB_NAME}
    volumes:
      - account-db-data:/var/lib/postgresql

  payment-db:
    <<: *postgres-base
    environment:
      POSTGRES_USER: ${PAYMENT_DB_USER}
      POSTGRES_PASSWORD: ${PAYMENT_DB_PASSWORD}
      POSTGRES_DB: ${PAYMENT_DB_NAME}
    volumes:
      - payment-db-data:/var/lib/postgresql

  transaction-db:
    <<: *postgres-base
    environment:
      POSTGRES_USER: ${TRANSACTION_DB_USER}
      POSTGRES_PASSWORD: ${TRANSACTION_DB_PASSWORD}
      POSTGRES_DB: ${TRANSACTION_DB_NAME}
    volumes:
      - transaction-db-data:/var/lib/postgresql

  fraud-db:
    <<: *postgres-base
    environment:
      POSTGRES_USER: ${FRAUD_DB_USER}
      POSTGRES_PASSWORD: ${FRAUD_DB_PASSWORD}
      POSTGRES_DB: ${FRAUD_DB_NAME}
    volumes:
      - fraud-db-data:/var/lib/postgresql

  notification-db:
    <<: *postgres-base
    environment:
      POSTGRES_USER: ${NOTIFICATION_DB_USER}
      POSTGRES_PASSWORD: ${NOTIFICATION_DB_PASSWORD}
      POSTGRES_DB: ${NOTIFICATION_DB_NAME}
    volumes:
      - notification-db-data:/var/lib/postgresql

  audit-db:
    <<: *postgres-base
    environment:
      POSTGRES_USER: ${AUDIT_DB_USER}
      POSTGRES_PASSWORD: ${AUDIT_DB_PASSWORD}
      POSTGRES_DB: ${AUDIT_DB_NAME}
    volumes:
      - audit-db-data:/var/lib/postgresql

  # ── Cassandra (audit log) ──────────────────────────────────────────────────
  # Profile-gated: needs ~1.5-2 GB free in the Docker VM. Default audit sink is
  # PostgreSQL (AUDIT_SINK=postgres); enable with: COMPOSE_PROFILES=cassandra make up
  # and set AUDIT_SINK=cassandra.
  cassandra:
    image: cassandra:5.0.8
    profiles: [cassandra]
    restart: unless-stopped
    networks: [internal]
    environment:
      CASSANDRA_CLUSTER_NAME: ${CASSANDRA_CLUSTER_NAME}
      MAX_HEAP_SIZE: ${CASSANDRA_HEAP:-512M}
      HEAP_NEWSIZE: ${CASSANDRA_NEW_HEAP:-100M}
      # cap off-heap: the entrypoint otherwise sizes direct memory from host RAM
      JVM_EXTRA_OPTS: "-XX:MaxDirectMemorySize=512M"
    mem_limit: 2g
    volumes:
      - cassandra-data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s

  cassandra-init:
    image: cassandra:5.0.8
    profiles: [cassandra]
    networks: [internal]
    restart: "no"
    depends_on:
      cassandra:
        condition: service_healthy
    entrypoint: ["cqlsh", "cassandra", "-f", "/init/init.cql"]
    volumes:
      - ./infra/cassandra/init.cql:/init/init.cql:ro

  # ── Application services ───────────────────────────────────────────────────
  user-service:
    mem_limit: 320m
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    restart: unless-stopped
    networks: [edge, internal]
    depends_on:
      users-db:
        condition: service_healthy
      redis-session:
        condition: service_healthy
      kafka:
        condition: service_healthy
      apicurio-registry:
        condition: service_healthy
    environment:
      USERS_DB_HOST: users-db
      USERS_DB_PORT: 5432
      USERS_DB_USER: ${USERS_DB_USER}
      USERS_DB_PASSWORD: ${USERS_DB_PASSWORD}
      USERS_DB_NAME: ${USERS_DB_NAME}
      REDIS_SESSION_HOST: redis-session
      REDIS_SESSION_PORT: 6379
      REDIS_SESSION_PASSWORD: ${REDIS_SESSION_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      SCHEMA_REGISTRY_URL: http://apicurio-registry:8080/apis/ccompat/v7
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL}
      REFRESH_TOKEN_TTL: ${REFRESH_TOKEN_TTL}
      JWT_PRIVATE_KEY_PATH: /secrets/jwt-es256-private.pem
      JWT_KID_PATH: /secrets/jwt-es256.kid
      COOKIE_ACCESS_NAME: ${COOKIE_ACCESS_NAME:-__Host-at}
      COOKIE_REFRESH_NAME: ${COOKIE_REFRESH_NAME:-__Secure-rt}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
    volumes:
      - ./secrets:/secrets:ro
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:8080/health/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "peikon.stack=true"
      - "traefik.docker.network=peikonpurekkusu_edge"
      # /auth + /.well-known are public (no ForwardAuth — they ARE the authenticator)
      - "traefik.http.routers.peikon-user-auth.rule=Host(`${API_HOST}`) && (PathPrefix(`/auth`) || PathPrefix(`/.well-known`))"
      - "traefik.http.routers.peikon-user-auth.entrypoints=web"
      - "traefik.http.routers.peikon-user-auth.middlewares=security-headers@file,api-ratelimit@file"
      - "traefik.http.routers.peikon-user-auth.service=peikon-user"
      # /users requires a verified session at the edge
      - "traefik.http.routers.peikon-user-users.rule=Host(`${API_HOST}`) && PathPrefix(`/users`)"
      - "traefik.http.routers.peikon-user-users.entrypoints=web"
      - "traefik.http.routers.peikon-user-users.middlewares=security-headers@file,api-ratelimit@file,jwt-auth@file"
      - "traefik.http.routers.peikon-user-users.service=peikon-user"
      - "traefik.http.services.peikon-user.loadbalancer.server.port=8080"

  account-service:
    mem_limit: 128m
    build:
      context: .
      dockerfile: services/account-service/Dockerfile
    restart: unless-stopped
    networks: [edge, internal]
    depends_on:
      account-db:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      kafka:
        condition: service_healthy
      apicurio-registry:
        condition: service_healthy
    environment:
      ACCOUNT_DB_HOST: account-db
      ACCOUNT_DB_PORT: 5432
      ACCOUNT_DB_USER: ${ACCOUNT_DB_USER}
      ACCOUNT_DB_PASSWORD: ${ACCOUNT_DB_PASSWORD}
      ACCOUNT_DB_NAME: ${ACCOUNT_DB_NAME}
      REDIS_CACHE_HOST: redis-cache
      REDIS_CACHE_PORT: 6379
      REDIS_CACHE_PASSWORD: ${REDIS_CACHE_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      SCHEMA_REGISTRY_URL: http://apicurio-registry:8080/apis/ccompat/v7
      WELCOME_SEED_MINOR_UNITS: ${WELCOME_SEED_MINOR_UNITS:-100000}
    healthcheck:
      # distroless (no shell/curl): the binary probes itself
      test: ["CMD", "/account-service", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    labels:
      - "traefik.enable=true"
      - "peikon.stack=true"
      - "traefik.docker.network=peikonpurekkusu_edge"
      - "traefik.http.routers.peikon-accounts.rule=Host(`${API_HOST}`) && PathPrefix(`/accounts`)"
      - "traefik.http.routers.peikon-accounts.entrypoints=web"
      - "traefik.http.routers.peikon-accounts.middlewares=security-headers@file,api-ratelimit@file,jwt-auth@file"
      - "traefik.http.services.peikon-account.loadbalancer.server.port=8080"
      - "traefik.http.services.peikon-account.loadbalancer.healthcheck.path=/health/ready"
      - "traefik.http.services.peikon-account.loadbalancer.healthcheck.interval=10s"

  mock-psp:
    mem_limit: 64m
    build:
      context: .
      dockerfile: services/mock-psp/Dockerfile
    restart: unless-stopped
    networks: [internal]
    depends_on:
      kafka:
        condition: service_healthy
      apicurio-registry:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      SCHEMA_REGISTRY_URL: http://apicurio-registry:8080/apis/ccompat/v7
      MOCK_PSP_LATENCY_MS: ${MOCK_PSP_LATENCY_MS}
      MOCK_PSP_FAILURE_RATE: ${MOCK_PSP_FAILURE_RATE}
    healthcheck:
      test: ["CMD", "/mock-psp", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  payment-service:
    mem_limit: 128m
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    restart: unless-stopped
    networks: [edge, internal]
    depends_on:
      payment-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      apicurio-registry:
        condition: service_healthy
      account-service:
        condition: service_healthy
      mock-psp:
        condition: service_healthy
    environment:
      PAYMENT_DB_HOST: payment-db
      PAYMENT_DB_PORT: 5432
      PAYMENT_DB_USER: ${PAYMENT_DB_USER}
      PAYMENT_DB_PASSWORD: ${PAYMENT_DB_PASSWORD}
      PAYMENT_DB_NAME: ${PAYMENT_DB_NAME}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      SCHEMA_REGISTRY_URL: http://apicurio-registry:8080/apis/ccompat/v7
      ACCOUNT_GRPC_ADDR: account-service:9090
      FRAUD_GRPC_ADDR: fraud-service:9090
      MOCK_PSP_BASE_URL: http://mock-psp:8080
      FRAUD_FAIL_OPEN_LIMIT: ${FRAUD_FAIL_OPEN_LIMIT:-5000}
    healthcheck:
      test: ["CMD", "/payment-service", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    labels:
      - "traefik.enable=true"
      - "peikon.stack=true"
      - "traefik.docker.network=peikonpurekkusu_edge"
      - "traefik.http.routers.peikon-payments.rule=Host(`${API_HOST}`) && PathPrefix(`/payments`)"
      - "traefik.http.routers.peikon-payments.entrypoints=web"
      - "traefik.http.routers.peikon-payments.middlewares=security-headers@file,payments-ratelimit@file,jwt-auth@file"
      - "traefik.http.services.peikon-payment.loadbalancer.server.port=8080"

  fraud-service:
    mem_limit: 320m
    build:
      context: .
      dockerfile: services/fraud-service/Dockerfile
    restart: unless-stopped
    networks: [internal]
    depends_on:
      fraud-db:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      kafka:
        condition: service_healthy
      apicurio-registry:
        condition: service_healthy
    environment:
      FRAUD_DB_HOST: fraud-db
      FRAUD_DB_PORT: 5432
      FRAUD_DB_USER: ${FRAUD_DB_USER}
      FRAUD_DB_PASSWORD: ${FRAUD_DB_PASSWORD}
      FRAUD_DB_NAME: ${FRAUD_DB_NAME}
      REDIS_CACHE_HOST: redis-cache
      REDIS_CACHE_PORT: 6379
      REDIS_CACHE_PASSWORD: ${REDIS_CACHE_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      SCHEMA_REGISTRY_URL: http://apicurio-registry:8080/apis/ccompat/v7
      FRAUD_FAIL_CLOSED_THRESHOLD: ${FRAUD_FAIL_OPEN_LIMIT:-5000}
      FRAUD_ML_ENABLED: "false"
    healthcheck:
      test: ["CMD", "dotnet", "FraudService.dll", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 25s

  transaction-service:
    mem_limit: 320m
    build:
      context: .
      dockerfile: services/transaction-service/Dockerfile
    restart: unless-stopped
    networks: [edge, internal]
    depends_on:
      transaction-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      apicurio-registry:
        condition: service_healthy
    environment:
      TRANSACTION_DB_HOST: transaction-db
      TRANSACTION_DB_PORT: 5432
      TRANSACTION_DB_USER: ${TRANSACTION_DB_USER}
      TRANSACTION_DB_PASSWORD: ${TRANSACTION_DB_PASSWORD}
      TRANSACTION_DB_NAME: ${TRANSACTION_DB_NAME}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      SCHEMA_REGISTRY_URL: http://apicurio-registry:8080/apis/ccompat/v7
    healthcheck:
      test: ["CMD", "dotnet", "TransactionService.dll", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 25s
    labels:
      - "traefik.enable=true"
      - "peikon.stack=true"
      - "traefik.docker.network=peikonpurekkusu_edge"
      - "traefik.http.routers.peikon-transactions.rule=Host(`${API_HOST}`) && PathPrefix(`/transactions`)"
      - "traefik.http.routers.peikon-transactions.entrypoints=web"
      - "traefik.http.routers.peikon-transactions.middlewares=security-headers@file,api-ratelimit@file,jwt-auth@file"
      - "traefik.http.services.peikon-transaction.loadbalancer.server.port=8080"

  audit-service:
    mem_limit: 128m
    build:
      context: .
      dockerfile: services/audit-service/Dockerfile
    restart: unless-stopped
    networks: [internal]
    depends_on:
      audit-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      apicurio-registry:
        condition: service_healthy
    environment:
      AUDIT_SINK: ${AUDIT_SINK:-postgres}
      AUDIT_DB_HOST: audit-db
      AUDIT_DB_PORT: 5432
      AUDIT_DB_USER: ${AUDIT_DB_USER}
      AUDIT_DB_PASSWORD: ${AUDIT_DB_PASSWORD}
      AUDIT_DB_NAME: ${AUDIT_DB_NAME}
      CASSANDRA_CONTACT_POINTS: cassandra
      CASSANDRA_KEYSPACE: audit
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      SCHEMA_REGISTRY_URL: http://apicurio-registry:8080/apis/ccompat/v7
    healthcheck:
      test: ["CMD", "/audit-service", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  notification-service:
    mem_limit: 320m
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    restart: unless-stopped
    networks: [edge, internal]
    depends_on:
      notification-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      apicurio-registry:
        condition: service_healthy
    environment:
      NOTIFICATION_DB_HOST: notification-db
      NOTIFICATION_DB_PORT: 5432
      NOTIFICATION_DB_USER: ${NOTIFICATION_DB_USER}
      NOTIFICATION_DB_PASSWORD: ${NOTIFICATION_DB_PASSWORD}
      NOTIFICATION_DB_NAME: ${NOTIFICATION_DB_NAME}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      SCHEMA_REGISTRY_URL: http://apicurio-registry:8080/apis/ccompat/v7
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:8080/health/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "peikon.stack=true"
      - "traefik.docker.network=peikonpurekkusu_edge"
      - "traefik.http.routers.peikon-notifications.rule=Host(`${API_HOST}`) && PathPrefix(`/notifications`)"
      - "traefik.http.routers.peikon-notifications.entrypoints=web"
      - "traefik.http.routers.peikon-notifications.middlewares=security-headers@file,api-ratelimit@file,jwt-auth@file"
      - "traefik.http.services.peikon-notification.loadbalancer.server.port=8080"

  frontend:
    mem_limit: 64m
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    networks: [edge]
    healthcheck:
      # 127.0.0.1 explicitly: in-container localhost resolves to ::1 first
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s
    labels:
      - "traefik.enable=true"
      - "peikon.stack=true"
      - "traefik.docker.network=peikonpurekkusu_edge"
      - "traefik.http.routers.peikon-frontend.rule=Host(`${APP_HOST}`)"
      - "traefik.http.routers.peikon-frontend.entrypoints=web"
      - "traefik.http.routers.peikon-frontend.middlewares=security-headers@file"
      - "traefik.http.services.peikon-frontend.loadbalancer.server.port=8080"

  # ── Observability (profile) ────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.132.0
    profiles: [observability]
    restart: unless-stopped
    networks: [internal]
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./infra/observability/otel-collector.yaml:/etc/otel/config.yaml:ro

networks:
  edge:
    name: peikonpurekkusu_edge
  internal:
    name: peikonpurekkusu_internal

volumes:
  kafka-data:
  redis-session-data:
  users-db-data:
  audit-db-data:
  registry-db-data:
  account-db-data:
  payment-db-data:
  transaction-db-data:
  fraud-db-data:
  notification-db-data:
  cassandra-data:
