syntax = "proto3";

package peikon.fraud.v1;

option go_package = "github.com/peikonpurekkusu/contracts/gen/go/fraud/v1;fraudv1";
option csharp_namespace = "Peikon.Contracts.Fraud.V1";

// FraudService is the inline pre-authorization scoring API.
// Callers set a hard gRPC deadline (~150 ms). On DEADLINE_EXCEEDED the caller
// applies its amount-tiered timeout policy (small: fail-open + flag,
// large: fail-closed / step-up) — the policy belongs to the caller, not here.
service FraudService {
  rpc Score(ScoreRequest) returns (ScoreResponse);
}

message ScoreRequest {
  string payment_id = 1;
  string user_id = 2;
  string account_id = 3;
  int64 amount_minor_units = 4;
  string currency_code = 5;
  string merchant_id = 6;
  string payment_method = 7;   // instrument type (card|wallet|bank)
  string device_fingerprint = 8;
  string ip_address = 9;       // coarse/anonymized upstream
  string country_code = 10;
  int64 requested_at_unix_ms = 11; // event time — velocity windows use this, not ingest time
}

enum Decision {
  DECISION_UNSPECIFIED = 0;
  DECISION_APPROVE = 1;
  DECISION_STEP_UP = 2;   // require fresh MFA (auth_time) before proceeding
  DECISION_HOLD = 3;      // manual review queue; payment stays processing
  DECISION_DENY = 4;
}

message RuleOutcome {
  string rule_name = 1;
  int32 score_delta = 2;
  string detail = 3;      // audit-safe explanation, no raw PII
}

message ScoreResponse {
  Decision decision = 1;
  int32 risk_score = 2;          // 0..100
  repeated RuleOutcome outcomes = 3;
  string model_version = 4;      // empty when ML hook disabled
  string fraud_log_id = 5;
}
