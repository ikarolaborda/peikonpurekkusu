openapi: 3.1.0
info:
  title: peikonpurekkusu public API
  version: 1.0.0
  description: >
    Gateway-facing API (behind Traefik). Auth is cookie-based (httpOnly; the SPA
    never handles tokens). All mutating requests require the X-CSRF-Token header.
    Money is integer minor units + ISO-4217 currency code.
servers:
  - url: http://api.localhost

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: __Host-at
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: { type: string, maxLength: 255 }
      description: >
        Client-generated key. Replays of the same key+payload return the stored
        response; same key with a different payload returns 422.
    CsrfToken:
      name: X-CSRF-Token
      in: header
      required: true
      schema: { type: string }
  schemas:
    Money:
      type: object
      required: [amount_minor_units, currency_code]
      properties:
        amount_minor_units: { type: integer }
        currency_code: { type: string, pattern: "^[A-Z]{3}$" }
    Problem:
      type: object
      description: RFC 9457 problem details
      properties:
        type: { type: string }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
    PaymentStatus:
      type: string
      enum: [requires_action, processing, succeeded, failed, canceled, refunded]
    Payment:
      type: object
      properties:
        id: { type: string, format: uuid }
        status: { $ref: "#/components/schemas/PaymentStatus" }
        amount: { $ref: "#/components/schemas/Money" }
        merchant_id: { type: string }
        instrument_id: { type: string, format: uuid }
        fx_quote: { $ref: "#/components/schemas/FxQuote" }
        failure_code: { type: [string, "null"] }
        receipt:
          type: object
          properties:
            transaction_id: { type: string, format: uuid }
            captured_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
    FxQuote:
      type: object
      properties:
        quote_id: { type: string, format: uuid }
        base: { type: string }
        quote: { type: string }
        rate: { type: string, description: decimal string }
        expires_at: { type: string, format: date-time }
    Balance:
      type: object
      properties:
        account_id: { type: string, format: uuid }
        available: { $ref: "#/components/schemas/Money" }
        held: { $ref: "#/components/schemas/Money" }
        as_of: { type: string, format: date-time }
        source: { type: string, enum: [ledger, cache] }

paths:
  /auth/register:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, first_name, last_name]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 12 }
                first_name: { type: string }
                last_name: { type: string }
      responses:
        "201": { description: Created (KYC pending) }
        "409": { description: Email already registered }

  /auth/login:
    post:
      summary: Login — sets __Host-at (access) and __Host-rt (refresh) cookies
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
                device_fingerprint: { type: string }
      responses:
        "200":
          description: Authenticated; CSRF token in body
          content:
            application/json:
              schema:
                type: object
                properties:
                  csrf_token: { type: string }
                  mfa_required: { type: boolean }
        "401": { description: Invalid credentials }
        "423": { description: Account frozen }

  /auth/mfa/verify:
    post:
      summary: Complete MFA challenge (login or step-up)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string }
      responses:
        "200": { description: Session elevated (fresh auth_time) }
        "401": { description: Invalid code }

  /auth/refresh:
    post:
      summary: Rotate the refresh token (single-use; reuse revokes the family)
      responses:
        "200": { description: New cookie pair set }
        "401": { description: Invalid/consumed refresh token — session family revoked }

  /auth/logout:
    post:
      summary: Revoke session (jti denylisted) and clear cookies
      security: [{ cookieAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/CsrfToken" }]
      responses:
        "204": { description: Logged out }

  /auth/sessions:
    get:
      summary: List active sessions (security center)
      security: [{ cookieAuth: [] }]
      responses:
        "200": { description: Sessions with device/IP/created_at }
    delete:
      summary: Revoke all sessions except the current one
      security: [{ cookieAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/CsrfToken" }]
      responses:
        "204": { description: All other sessions revoked }

  /users/me:
    get:
      summary: Current profile + KYC status
      security: [{ cookieAuth: [] }]
      responses:
        "200": { description: Profile }

  /accounts:
    get:
      summary: List own accounts
      security: [{ cookieAuth: [] }]
      responses:
        "200": { description: Accounts with balances (display cache, labeled as_of) }

  /accounts/{accountId}/balance:
    get:
      summary: Balance (authoritative or cached — see source field)
      security: [{ cookieAuth: [] }]
      parameters:
        - { name: accountId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Balance
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Balance" }

  /accounts/{accountId}/entries:
    get:
      summary: Ledger entries (paginated, immutable)
      security: [{ cookieAuth: [] }]
      parameters:
        - { name: accountId, in: path, required: true, schema: { type: string } }
        - { name: cursor, in: query, schema: { type: string } }
      responses:
        "200": { description: Entries page }

  /payments/fx-quote:
    post:
      summary: Get an FX quote for a cross-currency payment (rate locked until expires_at)
      security: [{ cookieAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/CsrfToken" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount, target_currency]
              properties:
                amount: { $ref: "#/components/schemas/Money" }
                target_currency: { type: string }
      responses:
        "200":
          description: Quote
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FxQuote" }

  /payments:
    post:
      summary: Initiate a payment (idempotent)
      security: [{ cookieAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/IdempotencyKey" }
        - { $ref: "#/components/parameters/CsrfToken" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [account_id, merchant_id, amount, instrument_id]
              properties:
                account_id: { type: string, format: uuid }
                merchant_id: { type: string }
                amount: { $ref: "#/components/schemas/Money" }
                instrument_id: { type: string, format: uuid }
                fx_quote_id: { type: [string, "null"] }
      responses:
        "202":
          description: Accepted — status=processing; watch /payments/{id}/events
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Payment" }
        "402": { description: Insufficient funds }
        "403": { description: Fraud denied / step-up required }
        "409": { description: Idempotency key currently locked (concurrent retry) }
        "422": { description: Same idempotency key, different payload }

  /payments/{paymentId}:
    get:
      summary: Payment status + receipt
      security: [{ cookieAuth: [] }]
      parameters:
        - { name: paymentId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Payment
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Payment" }

  /payments/{paymentId}/events:
    get:
      summary: SSE stream of live status transitions for this payment
      security: [{ cookieAuth: [] }]
      parameters:
        - { name: paymentId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: text/event-stream of PaymentStatus transitions

  /transactions:
    get:
      summary: Transaction history (query side)
      security: [{ cookieAuth: [] }]
      parameters:
        - { name: account_id, in: query, schema: { type: string } }
        - { name: cursor, in: query, schema: { type: string } }
      responses:
        "200": { description: Transactions page }

  /notifications:
    get:
      summary: In-app notification inbox
      security: [{ cookieAuth: [] }]
      responses:
        "200": { description: Notifications }
